trigger:
  - main

pool:
  vmImage: ubuntu-latest

steps:
  - script: echo Hello, world!
    displayName: 'Run a one-line script'

  - script: |
      echo Add other tasks to build, test, and deploy your project.
      echo See https://aka.ms/yaml
    displayName: 'Run a multi-line script'

  - bash: |
      set -euo pipefail

      RESULTS_URL="https://res.cloudinary.com/dbdw9yet9/raw/upload/v1776112428/test_java_estatico_main_java_20260413_195525_bax6fa.xml"

      if [ -z "$RESULTS_URL" ]; then
        echo "##vso[task.logissue type=error]TEST_RESULTS_URL no está definida."
        exit 1
      fi

      echo "Descargando resultados de tests desde: $RESULTS_URL"

      HTTP_STATUS=$(curl --silent --show-error --location \
        --retry 2 --connect-timeout 10 --max-time 30 \
        --write-out "%{http_code}" \
        --request GET "$RESULTS_URL" \
        -o test-results.xml)

      echo "HTTP status: $HTTP_STATUS"

      if [ "$HTTP_STATUS" != "200" ]; then
        echo "##vso[task.logissue type=error]El endpoint devolvió HTTP $HTTP_STATUS. No se pudo obtener el XML de resultados."
        exit 1
      fi

      if [ ! -s test-results.xml ]; then
        echo "##vso[task.logissue type=error]El archivo test-results.xml está vacío o no fue creado."
        exit 1
      fi

      echo "XML de resultados descargado correctamente."
      cat test-results.xml
    displayName: 'Descargar XML de resultados desde endpoint GET'
    env:
      TEST_RESULTS_URL: $(TEST_RESULTS_URL)

  - task: PublishTestResults@2
    displayName: 'Publicar resultados de tests'
    condition: always()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: 'test-results.xml'
      testRunTitle: 'Resultados de Tests - Ejemplo'
      failTaskOnFailedTests: true